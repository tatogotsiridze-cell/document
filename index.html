<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <p id="intro"> ss</p>

    <input id="numberInput" placeholder="ente number one to ten "/>
   
    <button onclick="checkNumber()">Click me</button>
 
<script>
function checkNumber() {
  var num = document.getElementById('numberInput').value;
  
  if (num >= 1 && num <= 10) {
    document.getElementById('intro').innerHTML = 'yes The number is between 1 and 10';
  }
  else if (num < 1) {
    document.getElementById('intro').innerHTML = 'no The number is less than 1';
  }
  else {
    document.getElementById('intro').innerHTML = 'no The number is more than 10';
  }
}
</script>
</body>
</html>
